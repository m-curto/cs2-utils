alias spawn_roll map0
alias map0 "alias spawn_current map_de_dust2; alias spawn_roll map1; say MAP_SPAWNS < [de_dust2] de_inferno de_cache de_overpass>;"
alias map1 "alias spawn_current map_de_inferno; alias spawn_roll map2; say MAP_SPAWNS < de_dust2 [de_inferno] de_cache de_overpass>;"
alias map2 "alias spawn_current map_de_cache; alias spawn_roll map3; say MAP_SPAWNS < de_dust2 de_inferno [de_cache] de_overpass>;"
alias map3 "alias spawn_current map_de_overpass; alias spawn_roll map0; say MAP_SPAWNS < de_dust2 de_inferno de_cache [de_overpass]>;"

alias spawn_current map_none;
alias map_none "say MAP_SPAWNS no map selected;"
alias map_de_dust2 "exec prac/prac_spawn_de_dust2.cfg; say MAP_SPAWNS de_dust2 loaded;"
alias map_de_inferno "exec prac/prac_spawn_de_inferno.cfg; say MAP_SPAWNS de_inferno loaded;"
alias map_de_cache "exec prac/prac_spawn_de_cache.cfg; say MAP_SPAWNS de_cache loaded;"
alias map_de_overpass "exec prac/prac_spawn_de_overpass.cfg; say MAP_SPAWNS de_overpass loaded;"