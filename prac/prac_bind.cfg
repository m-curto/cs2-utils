alias delete_nades "ent_fire smokegrenade_projectile kill;ent_fire molotov_projectile kill;ent_fire decoy_projectile kill;ent_fire hegrenade_projectile kill;ent_fire flashbang_projectile kill;stopsound;"
//alias delete_nades_ground "ent_fire weapon_smokegrenade kill;ent_fire weapon_molotov kill;ent_fire weapon_decoy kill;ent_fire weapon_incgrenade kill;ent_fire weapon_hegrenade kill;ent_fire weapon_flashbang kill;"

alias toggle_pipreview tpr0
alias tpr0 "sv_grenade_trajectory_prac_pipreview 0; alias toggle_pipreview tpr1; say camera < [0] 1>;"
alias tpr1 "sv_grenade_trajectory_prac_pipreview 1; alias toggle_pipreview tpr0; say camera < 0 [1]>;"

alias toggle_impacts ti0
alias ti0 "sv_showimpacts 0;sv_showimpacts_penetration 0; alias toggle_impacts ti1; say impacts/penetration < [0] 1 > < [0] 1 >;"
alias ti1 "sv_showimpacts 1;sv_showimpacts_penetration 0; alias toggle_impacts ti2; say impacts/penetration < 0 [1] > < [0] 1 >;"
alias ti2 "sv_showimpacts 0;sv_showimpacts_penetration 1; alias toggle_impacts ti3; say impacts/penetration < [0] 1 > < 0 [1] >;"
alias ti3 "sv_showimpacts 1;sv_showimpacts_penetration 1; alias toggle_impacts ti0; say impacts/penetration < 0 [1] > < 0 [1] >;"

alias toggle_impacts_time tit0
alias tit0 "sv_showimpacts_time 10;alias toggle_impacts_time tit1; say sv_showimpacts_time < [10] 5 2 1 >;"
alias tit1 "sv_showimpacts_time 5; alias toggle_impacts_time tit2; say sv_showimpacts_time < 10 [5] 2 1 >;"
alias tit2 "sv_showimpacts_time 2; alias toggle_impacts_time tit3; say sv_showimpacts_time < 10 5 [2] 1 >;"
alias tit3 "sv_showimpacts_time 1; alias toggle_impacts_time tit0; say sv_showimpacts_time < 10 5 2 [1] >;"

//alias +hold_dts_slow "demo_timescale 0.1"
//alias -hold_dts_slow "demo_timescale 1"

bind scancode73 toggle_pipreview	//INS
bind scancode76 delete_nades		//DEL
bind scancode74 spawn_roll		//HOME
bind scancode77 spawn_current 		//END
bind scancode75 toggle_impacts		//PGUP
