alias ppause ppause1
alias ppause1 "demo_pause;alias ppause ppause0"
alias ppause0 "demo_resume;alias ppause ppause1"

alias +hold_dts_speed "demo_timescale 4"
alias -hold_dts_speed "demo_timescale 1"
	
alias +hold_dts_slow "demo_timescale 0.1"
alias -hold_dts_slow "demo_timescale 1"

alias toggle_dts_slow tdtss1
alias tdtss1 "demo_timescale 0.1;alias toggle_dts_slow tdtss0"
alias tdtss0 "demo_timescale 1;alias toggle_dts_slow tdtss1"

//bind ins ppause
//bind ins demo_togglepause
//bind del "demo_gototick -320 relative"
//bind pgup +hold_dts_speed
//bind pgdn toggle_dts_slow
//bind pgdn +hold_dts_slow

//bind ins ppause
bind scancode73 demo_togglepause		// DEL
bind scancode76 "demo_gototick -320 relative"	// INS
bind scancode75 +hold_dts_speed			// PGUP
bind scancode78 toggle_dts_slow			// PGDN
//bind pgdn +hold_dts_slow

exec demo/demo_print.cfg